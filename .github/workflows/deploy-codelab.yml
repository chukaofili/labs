name: Deploy codelabs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "codelabs/**"
      - ".github/workflows/deploy-codelab.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false # no Go module here; claat is installed via `go install`

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - name: Build site (landing page + every codelab)
        run: |
          set -euo pipefail
          mkdir -p _site
          # Landing page that lists the codelabs.
          cp codelabs/index.html _site/index.html
          # Each codelabs/<name>/codelab.md exports to _site/<id>/ (id from its metadata).
          for dir in codelabs/*/; do
            [ -f "${dir}codelab.md" ] || continue
            echo "Exporting ${dir}codelab.md"
            # -f ../template.html: custom template that adds the "About this codelab" block.
            (cd "$dir" && claat export -f ../template.html -o "$GITHUB_WORKSPACE/_site" codelab.md)
          done
          echo "--- _site ---"
          find _site -maxdepth 2 -type d | sort

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
