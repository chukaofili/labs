name: Deploy codelab to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "codelabs/**"
      - ".github/workflows/deploy-codelab.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false # no Go module here; claat is installed via `go install`

      - name: Install claat
        run: go install github.com/googlecodelabs/tools/claat@latest

      - name: Export codelab with claat
        working-directory: codelabs
        run: claat export codelab.md

      - name: Assemble site (codelab at the root)
        run: |
          mkdir -p _site
          cp -r codelabs/build-rag-chatbot-ai-studio/. _site/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
